name: CI - Testes

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install pytest

      - name: Rodar testes
        run: pytest test_imc.py

      - name: Notificar Discord - Sucesso
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"✅ CI passou com sucesso no repositório calc_imc_python!\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notificar Discord - Falha
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"❌ CI falhou no repositório calc_imc_python! Verifique os testes.\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
